<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Club - Menú</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">🍕 Pizza Club</div>
    </header>

    <main class="main-content">
        <!-- El menú dinámico se inyectará aquí -->
        <div id="menu-container">
            <div class="loading-state">Cargando menú...</div>
        </div>
    </main>

    <!-- Botón Flotante para el Carrito -->
    <button id="floating-cart-btn" class="floating-cart-btn">
        🛒 Ver Carrito <span id="cart-count">(0)</span>
    </button>

    <!-- Modal Carrito -->
    <div id="cart-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu Pedido</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>

            <div id="cart-items-container" class="cart-items">
                <!-- Items inyectados JS -->
            </div>

            <div class="cart-summary hidden" id="cart-summary">
                <div class="total-row">
                    <span>Total:</span>
                    <span id="cart-total-price">$0,00</span>
                </div>

                <div class="client-info">
                    <label for="client-name">Tu nombre:</label>
                    <input type="text" id="client-name" placeholder="Para identificar tu pedido">
                </div>

                <div class="client-info">
                    <label for="horaRetiro">Horario de retiro en el local:</label>
                    <input type="time" id="horaRetiro">
                    <small style="font-size: 0.75rem; color: var(--color-gris);">Horario de atención: 10:00 a 23:00</small>
                </div>

                <div id="wallet_container"></div>

                <button id="btn-pagar-efectivo" class="btn-primary-efectivo">Pagar en Efectivo</button>
            </div>
        </div>
    </div>

    <!-- SDK y Scripts de la App -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
