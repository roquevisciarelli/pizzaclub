<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Club - Menú</title>
    <link rel="stylesheet" href="styles.css">
    <!-- SDK Mercado Pago JS -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body>
    <header class="header">
        <div class="logo">🍕 Pizza Club</div>
    </header>

    <main class="main-content">
        <!-- El menú dinámico se inyectará aquí -->
        <div id="menu-container">
            <div class="loading-state">Cargando menú...</div>
        </div>
    </main>

    <!-- Botón Flotante para el Carrito -->
    <button id="floating-cart-btn" class="floating-cart-btn">
        🛒 Ver Carrito <span id="cart-count">(0)</span>
    </button>

    <!-- Modal Carrito -->
    <div id="cart-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu Pedido</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>

            <div id="cart-items-container" class="cart-items">
                <!-- Items inyectados JS -->
            </div>

            <div class="cart-summary hidden" id="cart-summary">
                <div class="total-row">
                    <span>Total:</span>
                    <span id="cart-total-price">$0,00</span>
                </div>

                <div class="client-info">
                    <label for="nombreCliente">Nombre (Para retiro en local):</label>
                    <input type="text" id="nombreCliente" placeholder="Tu nombre..." required>
                </div>

                <div class="modalidad-info">
                    <span>Modalidad exclusiva: Retiro por el local</span>
                </div>

                <button id="btn-pagar-mp" class="btn-primary-mp">
                    Pagar con Mercado Pago
                </button>
            </div>
        </div>
    </div>

    <!-- SDK Inicializado en JS -->
    <script src="app.js"></script>
    <script src="carrito.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
