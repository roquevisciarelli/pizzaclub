<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Club - Pago Exitoso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="success-container">

        <div class="logo">🍕 Pizza Club</div>
        <br>
        <h1 style="color: var(--color-verde);">¡Pago exitoso!</h1>
        <p style="color: var(--color-gris); margin-top: 10px;">Procesando tu pedido, serás redirigido a WhatsApp...</p>
        <div class="spinner"></div>
        <!-- ✅ Agregar al success.html dentro de .success-container: -->
        <p id="status-message"></p>
        <span id="success-icon" class="hidden">✅</span>
        <p id="client-name-display"></p>
        <div id="order-details"></div>
        <a id="whatsapp-btn" class="hidden btn-primary" target="_blank">Ir a WhatsApp</a>
    </div>

    <script src="success.js"></script>
</body>
</html>
