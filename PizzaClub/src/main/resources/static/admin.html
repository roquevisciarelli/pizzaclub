<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - Pizza Club</title>
    <!-- Asegúrate de que la ruta a tu styles.css sea correcta -->
    <link rel="stylesheet" href="styles.css">
    <!-- Estilos adicionales para el panel de admin -->
    <style>
        /* Estilos básicos para el admin panel */
        body.admin-body {
            background-color: #f4f4f4;
            color: #333;
        }
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .login-container {
            max-width: 400px;
        }
        .dashboard-container {
            display: none; /* Oculto por defecto */
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--color-crema);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .admin-header h1 {
            color: var(--color-verde);
        }
        .logout-btn {
            background-color: var(--color-rojo);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .tab-button {
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--color-crema);
            background-color: #fff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
        }
        .tab-button.active {
            background-color: var(--color-verde);
            color: white;
            border-color: var(--color-verde);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .admin-table th, .admin-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .admin-table th {
            background-color: var(--color-crema);
        }
        .search-input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .admin-table img {
            max-width: 60px;
            border-radius: 4px;
        }
        .btn-primary {
            background-color: var(--color-dorado);
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .btn-edit {
             background-color: var(--color-verde); color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer;
        }
        .btn-delete {
             background-color: var(--color-rojo); color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-left: 5px;
        }

        /* Estilos para el Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 8px;
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-form label {
            display: block;
            margin-top: 10px;
        }
        .admin-form input, .admin-form select, .admin-form textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body class="admin-body">

    <!-- Contenedor de Login -->
    <div id="login-container" class="admin-container login-container">
        <h2>Acceso de Administrador</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Ingresar</button>
            <p id="login-error" style="color: var(--color-rojo); text-align: center;"></p>
        </form>
    </div>

    <!-- Contenedor del Dashboard -->
    <div id="dashboard-container" class="admin-container dashboard-container">
        <div class="admin-header">
            <h1>Panel de Administración</h1>
            <button id="logout-btn" class="logout-btn">Cerrar Sesión</button>
        </div>

        <div class="tabs">
            <button class="tab-button active" data-tab="categorias">Categorías</button>
            <button class="tab-button" data-tab="productos">Productos</button>
        </div>

        <!-- Contenido de la Pestaña Categorías -->
        <div id="categorias-content" class="tab-content active">
            <h2>Gestión de Categorías</h2>
            <button id="add-category-btn" class="btn-primary">Nueva Categoría</button>
            <input type="text" id="category-search" class="search-input" placeholder="Buscar...">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="categories-table-body">
                    <!-- Las filas se insertarán aquí desde JS -->
                </tbody>
            </table>
        </div>

        <!-- Contenido de la Pestaña Productos -->
        <div id="productos-content" class="tab-content">
            <h2>Gestión de Productos</h2>
            <button id="add-product-btn" class="btn-primary">Nuevo Producto</button>
            <input type="text" id="product-search" class="search-input" placeholder="Buscar...">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Disponible</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <!-- Las filas se insertarán aquí desde JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para Categorías -->
    <div id="category-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="category-modal-title">Nueva Categoría</h3>
            <form id="category-form" class="admin-form">
                <input type="hidden" id="category-id">
                <label for="category-name">Nombre:</label>
                <input type="text" id="category-name" required>
                <label for="category-active">Activo:</label>
                <input type="checkbox" id="category-active" checked>
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Guardar</button>
            </form>
        </div>
    </div>

    <!-- Modal para Productos -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="product-modal-title">Nuevo Producto</h3>
            <form id="product-form" class="admin-form">
                <input type="hidden" id="product-id">
                <label for="product-name">Nombre:</label>
                <input type="text" id="product-name" required>
                <label for="product-description">Descripción:</label>
                <textarea id="product-description" rows="3"></textarea>
                <label for="product-price">Precio:</label>
                <input type="number" id="product-price" step="0.01" required>
                <label for="product-category">Categoría:</label>
                <select id="product-category" required></select>
                <label for="product-available">Disponible:</label>
                <input type="checkbox" id="product-available" checked>
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Guardar</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
