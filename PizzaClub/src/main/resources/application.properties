# Server setup
server.port=${PORT:8080}

# MySQL Database configuration
# LOCAL: sin SSL, conexión estándar a MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/default_db
spring.datasource.username=root
spring.datasource.password=donato360

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:supersecretkeythatyoushouldchangeinproduction123!}
# 24 hours
jwt.expiration=${JWT_EXPIRATION:86400000}

# Cloudinary Configuration
# Mercado Pago Configuration
mercadopago.access_token=${MP_ACCESS_TOKEN:APP_USR-7691042361331669-062422-62a650cb058f74567e12888398762f1e-3497353474}

# Business Rules Configuration
business.schedule.open-time=10:00
business.schedule.close-time=23:00
business.whatsapp.number=${WHATSAPP_NUMBER:}

# Frontend Base URL (for MercadoPago redirects)
frontend.url=${FRONTEND_URL:http://localhost:8080}

# CORS Configuration
cors.allowed.origins=${CORS_ORIGINS:*}