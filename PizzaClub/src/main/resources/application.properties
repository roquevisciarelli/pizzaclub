# Server setup
server.port=${PORT:8080}

# MySQL Database configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pizzaclub_db}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:supersecretkeythatyoushouldchangeinproduction123!}
jwt.expiration=${JWT_EXPIRATION:86400000} # 24 hours

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# Mercado Pago Configuration
mercadopago.access_token=${MP_ACCESS_TOKEN:TEST-123456789-123456-123456789-123456789}

# Business Rules Configuration
business.schedule.open-time=10:00
business.schedule.close-time=23:00
business.whatsapp.number=${WHATSAPP_NUMBER:}

# Frontend Base URL (for MercadoPago redirects)
frontend.url=${FRONTEND_URL:http://localhost:3000}

# CORS Configuration
cors.allowed.origins=${CORS_ORIGINS:*}